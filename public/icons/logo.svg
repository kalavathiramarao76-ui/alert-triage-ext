<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="bgSheen" x1="0%" y1="0%" x2="40%" y2="40%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <rect width="128" height="128" rx="28" fill="url(#bgSheen)"/>
  <g filter="url(#shadow)">
    <!-- Pulse rings -->
    <circle cx="64" cy="64" r="40" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.15"/>
    <circle cx="64" cy="64" r="34" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
    <!-- Outer broken circle (gap at top-right) -->
    <path d="M 93.5,42.5 A 32,32 0 1,0 78,37" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <!-- Crack lines at the gap -->
    <line x1="93" y1="43" x2="96" y2="39" stroke="#ffffff" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
    <line x1="78" y1="37" x2="81" y2="33" stroke="#ffffff" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
    <line x1="95" y1="41" x2="98" y2="44" stroke="#ffffff" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
    <!-- Inner concentric rings -->
    <circle cx="64" cy="64" r="22" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.25"/>
    <circle cx="64" cy="64" r="12" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.2"/>
    <!-- Radar sweep arc -->
    <path d="M64,64 L64,32 A32,32 0 0,1 90,50 Z" fill="#ffffff" opacity="0.12"/>
    <path d="M64,64 L64,36 A28,28 0 0,1 86,52 Z" fill="#ffffff" opacity="0.08"/>
    <!-- Radar sweep line -->
    <line x1="64" y1="64" x2="86" y2="46" stroke="#ffffff" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>
    <!-- Crosshair at center -->
    <line x1="64" y1="58" x2="64" y2="70" stroke="#ffffff" stroke-width="1.8" opacity="0.9"/>
    <line x1="58" y1="64" x2="70" y2="64" stroke="#ffffff" stroke-width="1.8" opacity="0.9"/>
    <circle cx="64" cy="64" r="2" fill="#ffffff" opacity="0.8"/>
    <!-- Incident dots on radar -->
    <circle cx="72" cy="48" r="2.5" fill="#ffffff" opacity="0.85" filter="url(#glow)"/>
    <circle cx="50" cy="72" r="2" fill="#ffffff" opacity="0.6"/>
    <circle cx="78" cy="68" r="1.8" fill="#ffffff" opacity="0.5"/>
  </g>
</svg>